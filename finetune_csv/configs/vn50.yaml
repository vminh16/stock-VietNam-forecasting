# Cấu hình tinh chỉnh Kronos trên rổ cổ phiếu VN50
data:
  data_path: "data_cleaned"
  lookback_window: 126
  predict_window: 5
  max_context: 512
  clip: 5.0
  # Phân tách thời gian tuyệt đối (Temporal Splitting)
  train_end_date: "2023-01-01"
  val_end_date: "2024-01-01"

training:
  tokenizer_epochs: 10
  basemodel_epochs: 30
  batch_size: 16
  log_interval: 50
  num_workers: 4
  seed: 42
  
  tokenizer_learning_rate: 0.00005  # LR = 5e-5 cho controlled tokenizer adaptation
  predictor_learning_rate: 0.00002  # LR = 2e-5 (giảm 5 lần để tránh phá vỡ manifold)
  
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_weight_decay: 0.1           # Lực kéo L2 mạnh, chống overfitting
  accumulation_steps: 1
  
  # --- Optimization Objective (Early Stopping) ---
  early_stopping_monitor: "val_directional_accuracy"
  early_stopping_mode: "max"
  early_stopping_patience: 5

lora:
  enabled: true
  rank: 8                           # Giảm dung lượng adapter
  alpha: 8                          # Scaling Factor = 1.0 (Ổn định hóa)
  dropout: 0.25                     # Dropout cao cho tập dữ liệu nhỏ
  target_modules: ["q_proj", "v_proj"] # Chỉ train Q và V (giảm 50% params LoRA, K và Out_proj giữ nguyên)

optimization:
  amp_enabled: true
  pre_tokenize: true
  checkpoint_resume: false
  checkpoint_interval: 1

model_paths:
  pretrained_tokenizer: "pretrained/Kronos-Tokenizer-base"
  pretrained_predictor: "pretrained/Kronos-base"
  exp_name: "vn50_daily"
  base_path: "finetune_csv/finetuned"
  base_save_path: ""
  finetuned_tokenizer: "finetune_csv/finetuned/vn50_daily/tokenizer/best_model"
  tokenizer_save_name: "tokenizer"
  basemodel_save_name: "basemodel"

experiment:
  name: "kronos_vn50_finetune"
  description: "Finetune Kronos on VN50 daily stock data"
  use_comet: false
  train_tokenizer: true
  train_basemodel: true
  skip_existing: false

device:
  use_cuda: true
  device_id: 0
